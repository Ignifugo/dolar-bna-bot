name: Check Dolar BNA

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script
        run: python bot.py
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          MY_PHONE: ${{ secrets.MY_PHONE }}

      - name: Commit changes
        run: |
          git config --local user.email "bot@github.com"
          git config --local user.name "Dolar Bot"
          git add last_value.json || echo "No changes"
          git commit -m "Update last value" || echo "No changes to commit"
          git push
